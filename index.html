<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TV Indoor</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }
    #player {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img, video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔥 ALTERADO AQUI (tela cheia) */
      background: #000;
    }
  </style>
</head>
<body>
  <div id="player"></div>

  <script>
    const midias = [
      "midia/01.jpg",
      "midia/02.png",
      "midia/03.mp4",
      "midia/04.jpg"
    ];

    const tempoImagem = 6000;

    let i = 0;
    let timer = null;

    const player = document.getElementById("player");

    function limparTimer() {
      if (timer) { clearTimeout(timer); timer = null; }
    }

    function proximo() {
      i = (i + 1) % midias.length;
      tocar();
    }

    function tocar() {
      limparTimer();
      player.innerHTML = "";

      const arquivo = midias[i];
      const lower = arquivo.toLowerCase();

      const isVideo = lower.endsWith(".mp4") || lower.endsWith(".webm") || lower.endsWith(".ogg");

      if (isVideo) {
        const v = document.createElement("video");
        v.src = arquivo;

        v.autoplay = true;
        v.muted = true;
        v.playsInline = true;
        v.controls = false;
        v.loop = false;

        v.addEventListener("ended", proximo);
        v.addEventListener("error", () => {
          console.log("Erro ao carregar vídeo:", arquivo);
          proximo();
        });

        player.appendChild(v);

        v.play().catch(() => {});
      } else {
        const img = document.createElement("img");
        img.src = arquivo;

        img.onload = () => {
          timer = setTimeout(proximo, tempoImagem);
        };
        img.onerror = () => {
          console.log("Erro ao carregar imagem:", arquivo);
          proximo();
        };

        player.appendChild(img);
      }
    }

    tocar();
  </script>
</body>
</html>
