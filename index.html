<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TV Indoor</title>

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #rotator {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      background: #000;
    }

    #player {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    #player > img,
    #player > video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;     /* tela cheia */
      object-position: center;
      background: #000;
      display: block;
    }

    /* botão opcional p/ testar */
    #btn {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 9999;
      padding: 10px 14px;
      font-size: 14px;
      border: 0;
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
  </style>
</head>

<body>
  <div id="stage">
    <div id="rotator">
      <div id="player"></div>
    </div>
  </div>

  <button id="btn">Girar</button>

  <script>
    // ✅ SUA PLAYLIST (mantém como está)
    const midias = [
      "midia/01.jpg",
      "midia/02.png",
      "midia/03.mp4",
      "midia/04.jpg"
    ];

    const tempoImagem = 6000;

    // ✅ AJUSTE AQUI:
    // 0 = normal (PC)
    // 90 = gira direita
    // -90 = gira esquerda
    // 180 = de cabeça pra baixo
    let ROTACAO = 0;

    let i = 0;
    let timer = null;

    const rotator = document.getElementById("rotator");
    const player = document.getElementById("player");
    const btn = document.getElementById("btn");

    function aplicarRotacao() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      // Se rotacionar 90/-90, troca largura/altura do “quadro”
      const troca = (Math.abs(ROTACAO) === 90);

      const bw = troca ? h : w;
      const bh = troca ? w : h;

      rotator.style.width = bw + "px";
      rotator.style.height = bh + "px";
      rotator.style.transform = `translate(-50%, -50%) rotate(${ROTACAO}deg)`;
    }

    window.addEventListener("resize", aplicarRotacao);

    // Botão só pra testar rápido (pode remover depois)
    btn.addEventListener("click", () => {
      const opcoes = [0, 90, 180, -90];
      const idx = opcoes.indexOf(ROTACAO);
      ROTACAO = opcoes[(idx + 1) % opcoes.length];
      aplicarRotacao();
    });

    aplicarRotacao();

    function limparTimer() {
      if (timer) { clearTimeout(timer); timer = null; }
    }

    function proximo() {
      i = (i + 1) % midias.length;
      tocar();
    }

    function tocar() {
      limparTimer();
      player.innerHTML = "";

      const arquivo = midias[i];
      const lower = arquivo.toLowerCase();
      const isVideo = lower.endsWith(".mp4") || lower.endsWith(".webm") || lower.endsWith(".ogg");

      if (isVideo) {
        const v = document.createElement("video");
        v.src = arquivo;
        v.autoplay = true;
        v.muted = true;
        v.playsInline = true;
        v.controls = false;
        v.loop = false;

        v.addEventListener("ended", proximo);
        v.addEventListener("error", proximo);

        player.appendChild(v);
        v.play().catch(() => {});
      } else {
        const img = document.createElement("img");
        img.src = arquivo;

        img.onload = () => { timer = setTimeout(proximo, tempoImagem); };
        img.onerror = proximo;

        player.appendChild(img);
      }
    }

    tocar();
  </script>
</body>
</html>
